global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'fullstack-api'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['fullstack-api:3000']   # ← changed from "api"
        labels:
          service: fullstack-api-server
          environment: development
